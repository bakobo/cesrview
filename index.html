<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CESR Viewer</title>
    <meta
      name="description"
      content="Prettify and explore CESR — turn opaque KELs, TELs, and ACDCs into clear, spec-annotated data structures. A jwt.io for CESR."
    />
    <!-- Pre-paint theme: resolve stored choice, else the OS/browser preference, before React mounts
         so there is no flash of the wrong palette. Mirrors savedTheme() in ThemeToggle.tsx (s7prf4). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('cesrview-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
